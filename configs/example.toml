# AI Tunnel 配置示例文件
# 复制此文件并根据需要修改配置

[server]
# 服务器监听地址
host = "0.0.0.0"
# 服务器端口
port = 8080
# 是否启用 SSL
ssl_enabled = false
# SSL 证书路径（启用 SSL 时必填）
# ssl_cert_path = "certs/server.crt"
# SSL 密钥路径（启用 SSL 时必填）
# ssl_key_path = "certs/server.key"

[security]
# API 密钥（可选，用于认证）
# api_key = "your-secret-api-key"
# 允许的源（CORS）
allowed_origins = ["*"]
# 速率限制（每分钟请求数）
rate_limit = 100
# 是否启用加密
encryption_enabled = true

[logging]
# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# 日志文件路径（可选，不设置则只输出到控制台）
# file = "logs/ai_tunnel.log"
# 单个日志文件最大大小（字节）
max_size = 10485760
# 保留的备份文件数量
backup_count = 5
