# AI Tunnel 配置示例文件
# 复制此文件为 config.toml 并根据实际情况修改

# 应用基础配置
app_name = "ai_tunnel"
debug = false
log_level = "INFO"  # 可选值：DEBUG, INFO, WARNING, ERROR, CRITICAL

# 服务器配置
[server]
host = "0.0.0.0"
port = 8080
workers = 4
max_connections = 1000
keep_alive_timeout = 60
request_timeout = 30

# SSL 配置（可选，生产环境建议启用）
[server.ssl]
cert_path = "/path/to/your/cert.pem"
key_path = "/path/to/your/key.pem"
ca_bundle = "/path/to/ca-bundle.crt"  # 可选
verify_client = false
min_version = "TLSv1.2"  # 可选值：TLSv1.2, TLSv1.3

# API 提供商配置
[providers]

  # OpenAI 提供商配置
  [providers.openai]
  name = "OpenAI"
  api_endpoint = "https://api.openai.com/v1"
  api_key = "your-openai-api-key-here"
  timeout = 30
  retry_attempts = 3
  enabled = true
  
  # 模型映射（本地模型名：提供商模型名）
  [providers.openai.models]
  gpt-4 = "gpt-4"
  gpt-4-turbo = "gpt-4-turbo-preview"
  gpt-3.5-turbo = "gpt-3.5-turbo"

  # Anthropic 提供商配置
  [providers.anthropic]
  name = "Anthropic"
  api_endpoint = "https://api.anthropic.com/v1"
  api_key = "your-anthropic-api-key-here"
  timeout = 30
  retry_attempts = 3
  enabled = true
  
  [providers.anthropic.models]
  claude-3-opus = "claude-3-opus-20240229"
  claude-3-sonnet = "claude-3-sonnet-20240229"
  claude-3-haiku = "claude-3-haiku-20240307"

  # 自定义提供商配置示例
  [providers.custom]
  name = "Custom Provider"
  api_endpoint = "https://your-custom-api.com/v1"
  api_key = "your-custom-api-key-here"
  timeout = 60
  retry_attempts = 5
  enabled = false
  
  [providers.custom.models]
  custom-model-v1 = "model-v1"
  custom-model-v2 = "model-v2"
